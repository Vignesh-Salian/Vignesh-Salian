name: GitHub Space Shooter

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# This line gives it permission to save the image!
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2
          
      - uses: czl9707/gh-space-shooter@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
